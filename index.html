<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Погода</title>
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
</head>
<body>
    <div class="container">
        <div style="display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px;">
            <h1>Погода</h1>
            <div id="language-switcher">
                <button id="lang-ua" class="lang-btn active">UA</button>
                <button id="lang-en" class="lang-btn">EN</button>
                <button id="lang-ru" class="lang-btn">RU</button>
            </div>
        </div>

        <div class="selected-city">
            <h2 id="cityName">Краков</h2>
            <i class="fas" id="weatherIcon"></i>
            <div class="weather-info">
                <div class="temperature" id="temp">...</div>
                <div class="condition" id="condition">...</div>
                <div class="details">
                    <span><i class="fas fa-tint"></i> <span id="humidity"></span></span>
                    <span><i class="fas fa-wind"></i> <span id="wind"></span></span>
                </div>
            </div>
        </div>

        <div class="cities-list">
            <h3>Погода на 5 часов</h3>
            <ul id="cities">
                <li>Краков</li>
                <li>Київ</li>
                <li>Львів</li>
                <li>Варшава</li>
                <li>Вроцлав</li>
                <li>Гданськ</li>
            </ul>
        </div>

        <button id="refreshBtn">Оновити</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
